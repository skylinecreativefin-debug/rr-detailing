<header>

<section class="contact">

<h2>Pyydä tarjous</h2>

<div class="contact-box">

<p>
Täytä lomake ja palaamme mahdollisimman pian.
</p>

<form action="https://formspree.io/f/xkoloawe" method="POST">

<input type="text" name="Nimi" placeholder="Nimi" required>

<input type="tel" name="Puhelin" placeholder="Puhelinnumero" required>

<input type="email" name="Sähköposti" placeholder="Sähköpostiosoite" required>

<select name="Palvelu" required>

<option value="">Valitse palvelu</option>

<option value="1-Step Myllytys">
1-Step Myllytys
</option>

<option value="2-Step Myllytys">
2-Step Myllytys
</option>

</select>

<textarea
name="Lisätiedot"
placeholder="Kerro autosta tai mahdollisista toiveista"></textarea>

<button type="submit" class="btn">
Lähetä tarjouspyyntö
</button>

</form>

</div>

</section>

<footer>

<p>
© 2026 R&R Detailing
</p>

</footer>
