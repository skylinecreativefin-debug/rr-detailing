<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yhteydenotto | R&R Detailing</title>

<meta name="description" content="Pyydä tarjous auton myllytyksestä tai ota yhteyttä R&R Detailingiin Nokialla.">

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="script.js" defer></script>

</head>

<body>

<header>

<div class="logo">
R&R Detailing
</div>

<div class="menu-btn">
☰
</div>

<nav>
<a href="index.html">Etusivu</a>
<a href="hinnasto.html">Palvelut</a>
<a href="varaus.html">Yhteydenotto</a>
<a href="tietoa.html">Tietoa</a>
<a href="yhteystiedot.html">Yhteystiedot</a>
</nav>

</header>

<section class="booking-hero">

<div class="booking-overlay"></div>

<div class="booking-content">

<div class="tag">
R&R Detailing • Nokia
</div>

<h1>Pyydä tarjous</h1>

<p>
Lähetä yhteystietosi ja kerro autostasi.
Otamme yhteyttä mahdollisimman nopeasti ja sovitaan sopiva aika.
</p>

</div>

</section>

<section class="booking-form-section">

<div class="booking-form-box">

<h2>Tarjouspyyntö</h2>

<form action="https://formspree.io/f/meedazkl" method="POST">

<input
type="text"
name="Nimi"
placeholder="Nimi"
required>

<input
type="tel"
name="Puhelin"
placeholder="Puhelinnumero"
required>

<input
type="email"
name="Sähköposti"
placeholder="Sähköpostiosoite"
required>

<input
type="text"
name="Auto"
placeholder="Auton merkki ja malli"
required>

<select
name="Palvelu"
required>

<option value="">
Valitse palvelu
</option>

<option value="1 Step Myllytys">
1 Step Myllytys – 150€
</option>

<option value="2 Step Myllytys">
2 Step Myllytys – 250€
</option>

</select>

<textarea
name="Lisätiedot"
placeholder="Kerro auton kunnosta, naarmuista tai muista toiveista"
required></textarea>

<button type="submit" class="btn">
Lähetä tarjouspyyntö
</button>

</form>

</div>

</section>

<footer>
<p>© 2026 R&R Detailing</p>
</footer>

</body>
</html>
